<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#c97f86">
  <title>Wedding Control Center v7</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="eyebrow">WEDDING CONTROL CENTER</div>
    <h1 id="appTitle">婚禮工作中心</h1>
    <div class="status-line">
      <span id="currentUser">尚未設定使用者</span>
      <span id="syncState" class="sync bad">準備連線</span>
    </div>
  </header>

  <nav id="tabs" class="tabs">
    <button class="tab active" data-view="dashboard">首頁</button>
    <button class="tab" data-view="prepare">前置準備</button>
    <button class="tab" data-view="timeline">婚禮流程</button>
    <button class="tab" data-view="mine">我的任務</button>
    <button class="tab" data-view="people">人員</button>
    <button class="tab" data-view="settings">設定</button>
  </nav>

  <main>
    <section id="dashboard" class="panel active"></section>
    <section id="prepare" class="panel"></section>
    <section id="timeline" class="panel"></section>
    <section id="mine" class="panel"></section>
    <section id="people" class="panel"></section>
    <section id="settings" class="panel"></section>
  </main>
</div>

<button id="fab" class="fab" aria-label="新增">＋</button>

<dialog id="userDialog"><form id="userForm" class="sheet">
  <h2>設定目前使用者</h2>
  <label>姓名<input id="userName" maxlength="30" required></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="userDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>

<dialog id="taskDialog"><form id="taskForm" class="sheet">
  <h2 id="taskDialogTitle">新增前置項目</h2>
  <input id="taskId" type="hidden">
  <label>名稱<input id="taskTitle" maxlength="80" required></label>
  <label>大分類<select id="taskCategory"></select></label>
  <label>類型<select id="taskType"><option value="工作">工作</option><option value="物品">準備物品</option></select></label>
  <label>DRI／負責人<input id="taskOwner" maxlength="30" list="peopleList" placeholder="可直接輸入姓名"></label>
  <label>連動到婚禮流程<div id="taskFlowPicker" class="chips"></div></label>
  <div class="hint">勾選流程後，系統會自動在該流程建立一筆「現場確認」項目。</div>
  <label>備註<textarea id="taskNotes"></textarea></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="taskDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>

<dialog id="groupDialog"><form id="groupForm" class="sheet">
  <h2 id="groupDialogTitle">新增流程群組</h2>
  <input id="groupId" type="hidden">
  <label>群組名稱<input id="groupName" maxlength="40" required placeholder="例如：文定、迎娶、婚宴"></label>
  <label>圖示<input id="groupIcon" maxlength="4" value="🗂️"></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="groupDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>

<dialog id="flowDialog"><form id="flowForm" class="sheet">
  <h2 id="flowDialogTitle">新增流程</h2>
  <input id="flowId" type="hidden">
  <label>流程群組<select id="flowGroup"></select></label>
  <label>時間<input id="flowTime" type="time"></label>
  <label>流程名稱<input id="flowName" maxlength="50" required></label>
  <label>圖示<input id="flowIcon" maxlength="4" value="📍"></label>
  <label>負責人<input id="flowOwner" maxlength="30" list="peopleList"></label>
  <label>地點名稱<input id="flowLocation" maxlength="80" placeholder="例如：女方家、飯店"></label>
  <label>地址<input id="flowAddress" maxlength="160" placeholder="輸入地址即可產生 Google 地圖連結"></label>
  <label>Google Maps 連結<input id="flowMapUrl" type="url" placeholder="可留空，系統會依地址產生"></label>
  <label>提醒內容<textarea id="flowNotes"></textarea></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="flowDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>

<dialog id="checkDialog"><form id="checkForm" class="sheet">
  <h2 id="checkDialogTitle">新增流程確認項目</h2>
  <input id="checkId" type="hidden"><input id="checkFlowId" type="hidden">
  <label>確認項目<input id="checkTitle" maxlength="60" required></label>
  <label>負責人<input id="checkOwner" maxlength="30" list="peopleList"></label>
  <label>連結前置項目<select id="checkTaskLink"><option value="">不連結</option></select></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="checkDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>

<dialog id="personDialog"><form id="personForm" class="sheet">
  <h2 id="personDialogTitle">新增人員</h2>
  <input id="personId" type="hidden">
  <label>姓名<input id="personName" maxlength="30" required></label>
  <label>角色<input id="personRole" maxlength="40"></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="personDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>

<dialog id="categoryDialog"><form id="categoryForm" class="sheet">
  <h2 id="categoryDialogTitle">新增分類</h2>
  <input id="categoryId" type="hidden">
  <label>分類名稱<input id="categoryName" maxlength="40" required></label>
  <label>圖示<input id="categoryIcon" maxlength="4" value="📂"></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="categoryDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>

<datalist id="peopleList"></datalist>
<script type="module" src="./app.js"></script>
</body>
</html>
