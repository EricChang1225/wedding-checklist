<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#c97f86">
  <meta name="description" content="駿瑋 &amp; 忞靜 婚禮管家｜前置準備、婚禮流程與多人即時同步">
  <link rel="canonical" href="https://ericchang1225.github.io/wedding-checklist/">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_TW">
  <meta property="og:site_name" content="駿瑋 &amp; 忞靜 婚禮 Checklist">
  <meta property="og:title" content="駿瑋 &amp; 忞靜｜婚禮 Checklist">
  <meta property="og:description" content="婚禮工作中心｜前置準備、婚禮流程與多人即時同步">
  <meta property="og:url" content="https://ericchang1225.github.io/wedding-checklist/">
  <meta property="og:image" content="https://ericchang1225.github.io/wedding-checklist/og-card.png?v=110">
  <meta property="og:image:secure_url" content="https://ericchang1225.github.io/wedding-checklist/og-card.png?v=110">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="駿瑋與忞靜婚禮 Checklist">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="駿瑋 &amp; 忞靜｜婚禮 Checklist">
  <meta name="twitter:description" content="婚禮工作中心｜前置準備、婚禮流程與多人即時同步">
  <meta name="twitter:image" content="https://ericchang1225.github.io/wedding-checklist/og-card.png?v=110">
  <title>駿瑋 &amp; 忞靜｜婚禮 Checklist</title>
  <link rel="stylesheet" href="./style.css?v=5300">
</head>
<body>
<div class="app">
  <header class="hero hero-v25">
    <div class="hero-topline">WEDDING BUTLER · V3</div>
    <div class="hero-title-line compact-title-line">
      <div>
        <div id="coupleTitle" class="couple-title compact-couple-title">駿瑋 &amp; 忞靜 婚禮</div>
      </div>
      <button id="adminModeButton" class="admin-mode-button" type="button">🔒</button>
    </div>

    <div class="hero-info-grid compact-hero-grid">
      <div class="hero-countdown-box">
        <div class="hero-info-label">距離婚禮 💍</div>
        <div><strong id="heroDays">--</strong><span class="hero-days-unit"> 天</span></div>
        <div id="heroDate" class="hero-date">尚未設定日期</div>
      </div>

      <div class="hero-user-box">
        <label class="hero-info-label" for="currentUserSelect">使用者</label>
        <select id="currentUserSelect" class="hero-user-select">
          <option value="">請選擇使用者</option>
        </select>
      </div>
    </div>

    <div class="status-line hero-status-line">
      <span id="currentUser" class="visually-hidden">尚未設定使用者</span>
      <span id="syncState" class="sync bad">準備連線</span>
    </div>
  </header>

  <nav id="tabs" class="tabs">
    <button class="tab active" data-view="dashboard">我的行程</button>
    <button class="tab" data-view="timeline">婚禮流程</button>
    <button class="tab" data-view="prepare">婚禮準備</button>
    <button class="tab" data-view="rosters">工作名單</button>
    <button class="tab" data-view="banquet">婚宴資訊</button>
    <button class="tab" data-view="taskcenter">任務中心</button>
    <button class="tab" data-view="people">人員</button>
    <button class="tab admin-only-tab" data-view="settings">設定</button>
  </nav>

  <main>
    <section id="dashboard" class="panel active"></section>
    <section id="taskcenter" class="panel"></section>
    <section id="prepare" class="panel"></section>
    <section id="rosters" class="panel"></section>
    <section id="timeline" class="panel"></section>
    <section id="mine" class="panel"></section>
    <section id="people" class="panel"></section>
    <section id="banquet" class="panel">
      <iframe id="banquetFrame" class="banquet-frame" src="./banquet.html?v=3000" title="婚宴中心"></iframe>
    </section>
    <section id="settings" class="panel"></section>
  </main>
</div>

<button id="fab" class="fab" aria-label="新增">＋</button>


<dialog id="adminSetupDialog"><form id="adminSetupForm" class="sheet">
  <h2 id="adminSetupTitle">建立管理密碼</h2>
  <p class="hint">只會在整個婚禮專案尚未設定密碼時出現一次。其他人之後不會看到這個畫面。</p>
  <label>管理密碼<input id="adminSetupPassword" type="password" minlength="4" required autocomplete="new-password"></label>
  <label>再次輸入<input id="adminSetupConfirm" type="password" minlength="4" required autocomplete="new-password"></label>
  <div class="sheet-actions">
    <button type="button" class="btn" data-close="adminSetupDialog">取消</button>
    <button class="btn primary">儲存密碼</button>
  </div>
</form></dialog>

<dialog id="adminLoginDialog"><form id="adminLoginForm" class="sheet">
  <h2>進入管理模式</h2>
  <label>管理密碼<input id="adminLoginPassword" type="password" required autocomplete="current-password"></label>
  <div id="adminLoginError" class="error-text"></div>
  <div class="sheet-actions">
    <button type="button" class="btn" data-close="adminLoginDialog">取消</button>
    <button class="btn primary">確定</button>
  </div>
</form></dialog>


<dialog id="rosterDialog"><form id="rosterForm" class="sheet">
  <h2 id="rosterDialogTitle">新增名單</h2>
  <input id="rosterId" type="hidden">
  <label>名單名稱<input id="rosterName" maxlength="50" required placeholder="例如：喝茶名單、招待名單"></label>
  <label>圖示<input id="rosterIcon" maxlength="4" value="📋"></label>
  <label>集合時間<input id="rosterTime" type="time"></label>
  <label>集合地點<input id="rosterLocation" maxlength="100"></label>
  <label>關聯流程<select id="rosterFlow"><option value="">不連結流程</option></select></label>
  <label>總招待<select id="rosterChiefUsher"><option value="">未指定</option></select></label>
  <label>共同工作內容<textarea id="rosterDuty" placeholder="例如：依序入座接受奉茶、入口接待與帶位"></textarea></label>
  <label>備註<textarea id="rosterNotes"></textarea></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="rosterDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>

<dialog id="rosterMemberDialog"><form id="rosterMemberForm" class="sheet">
  <h2 id="rosterMemberDialogTitle">加入名單成員</h2>
  <input id="rosterMemberId" type="hidden">
  <input id="rosterMemberRosterId" type="hidden">
  <label>選擇人員<select id="rosterMemberPerson"></select></label>
  <label>順序<input id="rosterMemberOrder" type="number" min="1"></label>
  <label>個人工作<input id="rosterMemberDuty" maxlength="100" placeholder="例如：第 3 位喝茶、入口左側帶位"></label>
  <label>負責桌次（可複選）
    <div id="rosterTablePicker" class="table-picker"></div>
    <input id="rosterMemberTables" type="hidden">
  </label>
  <label>備註<textarea id="rosterMemberNotes"></textarea></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="rosterMemberDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>
<dialog id="taskDialog"><form id="taskForm" class="sheet">
  <h2 id="taskDialogTitle">新增前置項目</h2>
  <input id="taskId" type="hidden">
  <label>名稱<input id="taskTitle" maxlength="80" required></label>
  <label>大分類<select id="taskCategory"></select></label>
  <label>類型<select id="taskType"><option value="工作">工作</option><option value="物品">準備物品</option></select></label>
  <div id="workExtraFields" class="work-extra-fields">
    <label>工作類別
      <select id="taskWorkKind">
        <option value="一般">📋 一般</option>
        <option value="接送">🚗 接送</option>
        <option value="採買">🛍️ 採買</option>
        <option value="聯絡">📞 聯絡</option>
        <option value="協助">🛠️ 協助</option>
        <option value="其他">⭐ 其他</option>
      </select>
    </label>
    <div class="time-range-grid active">
      <label>開始時間<input id="taskStartTime" type="time"></label>
      <label>結束時間<input id="taskEndTime" type="time"></label>
    </div>
    <label>地點<input id="taskLocation" maxlength="120" placeholder="例如：桃園高鐵站"></label>
    <label>地址<input id="taskAddress" maxlength="180" placeholder="例如：桃園市桃園區中正路1號"></label>
    <label>重要程度
      <select id="taskPriority">
        <option value="1">一般</option>
        <option value="2">重要</option>
        <option value="3">非常重要</option>
      </select>
    </label>
  </div>
  <label>DRI／負責人（可複選）
    <div id="taskOwnerPicker" class="owner-picker"></div>
    <input id="taskOwner" type="hidden">
  </label>
  <label>連動到婚禮流程（可不選）<div id="taskFlowPicker" class="chips"></div></label>
  <div class="hint">接送、採買等獨立工作不必勾選流程；只有需要同步到現場確認時才連動。</div>
  <label>備註<textarea id="taskNotes"></textarea></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="taskDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>


<dialog id="subItemDialog"><form id="subItemForm" class="sheet">
  <h2 id="subItemDialogTitle">新增細項</h2>
  <input id="subItemId" type="hidden">
  <input id="subItemTaskId" type="hidden">
  <label>細項名稱<input id="subItemTitle" maxlength="80" required placeholder="例如：金飾、茶盤、禮炮"></label>
  <label>備註<textarea id="subItemNotes"></textarea></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="subItemDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>

<dialog id="groupDialog"><form id="groupForm" class="sheet">
  <h2 id="groupDialogTitle">新增流程群組</h2>
  <input id="groupId" type="hidden">
  <label>群組名稱<input id="groupName" maxlength="40" required placeholder="例如：文定、迎娶、婚宴"></label>
  <label>圖示<input id="groupIcon" maxlength="4" value="🗂️"></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="groupDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>

<dialog id="flowDialog"><form id="flowForm" class="sheet">
  <h2 id="flowDialogTitle">新增流程</h2>
  <input id="flowId" type="hidden">
  <label>流程群組<select id="flowGroup"></select></label>
  <label>時間模式
    <select id="flowTimeMode">
      <option value="none">不設定時間</option>
      <option value="single">單一時間</option>
      <option value="range">時間區間</option>
    </select>
  </label>
  <div id="flowSingleTimeField" class="time-mode-field">
    <label>時間<input id="flowTime" type="time"></label>
  </div>
  <div id="flowRangeTimeFields" class="time-mode-field time-range-grid">
    <label>開始時間<input id="flowStartTime" type="time"></label>
    <label>結束時間<input id="flowEndTime" type="time"></label>
  </div>
  <label>流程名稱<input id="flowName" maxlength="50" required></label>
  <label>圖示<input id="flowIcon" maxlength="4" value="📍"></label>
  <label>負責人（可複選）
    <div id="flowOwnerPicker" class="owner-picker"></div>
    <input id="flowOwner" type="hidden">
  </label>
  <label>連結工作名單（可複選）
    <div id="flowRosterPicker" class="flow-roster-picker"></div>
    <input id="flowRosterIds" type="hidden">
  </label>
  <label>地點名稱<input id="flowLocation" maxlength="80" placeholder="例如：女方家、飯店"></label>
  <label>地址<input id="flowAddress" maxlength="160" placeholder="輸入地址即可產生 Google 地圖連結"></label>
  <label>Google Maps 連結<input id="flowMapUrl" type="url" placeholder="可留空，系統會依地址產生"></label>
  <label>提醒內容<textarea id="flowNotes"></textarea></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="flowDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>

<dialog id="checkDialog"><form id="checkForm" class="sheet">
  <h2 id="checkDialogTitle">新增流程確認項目</h2>
  <input id="checkId" type="hidden"><input id="checkFlowId" type="hidden">
  <label>確認項目<input id="checkTitle" maxlength="60" required></label>
  <label>負責人<select id="checkOwner"><option value="">未指定</option></select></label>
  <label>連結前置項目<select id="checkTaskLink"><option value="">不連結</option></select></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="checkDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>

<dialog id="personDialog"><form id="personForm" class="sheet">
  <h2 id="personDialogTitle">新增人員</h2>
  <input id="personId" type="hidden">
  <label>姓名<input id="personName" maxlength="30" required></label>
  <label>角色<input id="personRole" maxlength="40"></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="personDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>

<dialog id="categoryDialog"><form id="categoryForm" class="sheet">
  <h2 id="categoryDialogTitle">新增大項</h2>
  <input id="categoryId" type="hidden">
  <label>大項名稱<input id="categoryName" maxlength="40" required></label>
  <label>圖示<input id="categoryIcon" maxlength="4" value="📂"></label>
  <div class="sheet-actions"><button type="button" class="btn" data-close="categoryDialog">取消</button><button class="btn primary">儲存</button></div>
</form></dialog>

<datalist id="peopleList"></datalist>
<script type="module" src="./app.js?v=5300"></script>
</body>
</html>
