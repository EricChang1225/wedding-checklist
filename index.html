<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#c97f86">
  <title>婚禮 Checklist</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="eyebrow">WEDDING CHECKLIST</div>
    <h1 id="appTitle">婚禮 Checklist</h1>
    <div class="status-line">
      <span id="who">尚未設定姓名</span>
      <span id="sync" class="sync bad">準備連線</span>
    </div>
    <div class="progress-row">
      <div class="bar"><span id="bar"></span></div>
      <strong id="pct">0%</strong>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-view="tasks">全部任務</button>
    <button class="tab" data-view="mine">我的任務</button>
    <button class="tab" data-view="people">人員</button>
    <button class="tab" data-view="categories">分類</button>
    <button class="tab" data-view="settings">設定</button>
  </nav>

  <main>
    <section class="panel active" id="tasks"></section>
    <section class="panel" id="mine"></section>
    <section class="panel" id="people"></section>
    <section class="panel" id="categories"></section>
    <section class="panel" id="settings"></section>
  </main>
</div>

<button class="fab" id="fab" aria-label="新增">＋</button>

<dialog id="nameDialog">
  <form class="sheet" id="nameForm">
    <h2>設定目前使用者</h2>
    <div class="field">
      <label for="displayName">姓名</label>
      <input id="displayName" maxlength="20" required>
    </div>
    <div class="sheet-actions">
      <button type="button" class="btn" data-close="nameDialog">取消</button>
      <button class="btn primary">儲存</button>
    </div>
  </form>
</dialog>

<dialog id="taskDialog">
  <form class="sheet" id="taskForm">
    <h2 id="taskDialogTitle">新增任務</h2>
    <input type="hidden" id="taskId">

    <div class="field">
      <label for="taskTitle">任務名稱</label>
      <input id="taskTitle" maxlength="80" required>
    </div>

    <div class="field">
      <label for="taskType">類型</label>
      <select id="taskType">
        <option value="工作">工作內容</option>
        <option value="物品">準備物品</option>
      </select>
    </div>

    <div class="field">
      <label for="taskCategory">大分類</label>
      <select id="taskCategory"></select>
    </div>

    <div class="field">
      <label for="assigneeInput">負責人（自由輸入，可多人）</label>
      <div class="assignee-input-row">
        <input id="assigneeInput" maxlength="20" placeholder="輸入姓名後按加入">
        <button type="button" class="btn" id="addAssignee">加入</button>
      </div>
      <div id="assigneeSuggestions" class="suggestions"></div>
      <div id="assigneeTags" class="chips"></div>
    </div>

    <div class="field">
      <label for="taskNotes">備註</label>
      <textarea id="taskNotes"></textarea>
    </div>

    <div class="sheet-actions">
      <button type="button" class="btn" data-close="taskDialog">取消</button>
      <button class="btn primary">儲存</button>
    </div>
  </form>
</dialog>

<dialog id="personDialog">
  <form class="sheet" id="personForm">
    <h2 id="personDialogTitle">新增人員</h2>
    <input type="hidden" id="personId">
    <div class="field">
      <label for="personName">姓名</label>
      <input id="personName" maxlength="20" required>
    </div>
    <div class="field">
      <label for="personRole">角色</label>
      <input id="personRole" maxlength="30" placeholder="例如：媒人、攝影師、司機">
    </div>
    <div class="sheet-actions">
      <button type="button" class="btn" data-close="personDialog">取消</button>
      <button class="btn primary">儲存</button>
    </div>
  </form>
</dialog>

<dialog id="categoryDialog">
  <form class="sheet" id="categoryForm">
    <h2 id="categoryDialogTitle">新增分類</h2>
    <input type="hidden" id="categoryId">
    <div class="field">
      <label for="categoryName">分類名稱</label>
      <input id="categoryName" maxlength="30" required>
    </div>
    <div class="field">
      <label for="categoryIcon">圖示</label>
      <input id="categoryIcon" maxlength="4" placeholder="例如：💍">
    </div>
    <div class="sheet-actions">
      <button type="button" class="btn" data-close="categoryDialog">取消</button>
      <button class="btn primary">儲存</button>
    </div>
  </form>
</dialog>

<script type="module" src="./app.js"></script>
</body>
</html>
